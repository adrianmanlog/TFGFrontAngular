<button class="btn btn-danger btn-chat-flotante shadow-lg" (click)="toggleChat()">
  @if (abierto()) {
    <i class="bi bi-x-lg fs-4"></i>
  } @else {
    <i class="bi bi-robot fs-3"></i>
  }
</button>

@if (abierto()) {
  <div class="chat-ventana shadow-lg bg-white rounded-4 overflow-hidden border">
    
    <div class="bg-dark text-white p-3 d-flex align-items-center">
      <i class="bi bi-robot fs-4 me-2 text-danger"></i>
      <div>
        <h6 class="mb-0 fw-bold">Asistente Beni IA</h6>
        <small class="text-success fw-bold"><i class="bi bi-circle-fill" style="font-size: 0.5rem;"></i> En línea</small>
      </div>
    </div>

    <div class="chat-mensajes p-3" #scrollMe [scrollTop]="scrollMe.scrollHeight">
      @for (msg of mensajes(); track $index) {
        <div class="mb-3 d-flex" [class.justify-content-end]="msg.emisor === 'usuario'">
          <div class="mensaje-burbuja p-2 px-3 rounded-4 shadow-sm text-break"
               [class.bg-danger]="msg.emisor === 'usuario'"
               [class.text-white]="msg.emisor === 'usuario'"
               [class.bg-light]="msg.emisor === 'bot'"
               [class.border]="msg.emisor === 'bot'">
            {{ msg.texto }}
          </div>
        </div>
      }

      @if (cargando()) {
        <div class="mb-3 d-flex">
          <div class="mensaje-burbuja p-2 px-3 rounded-4 bg-light border text-muted">
            <span class="spinner-grow spinner-grow-sm me-1"></span>
            <span class="spinner-grow spinner-grow-sm me-1"></span>
            <span class="spinner-grow spinner-grow-sm"></span>
          </div>
        </div>
      }
    </div>

    <div class="chat-input p-2 border-top bg-light">
      <div class="input-group">
        <input type="text" class="form-control rounded-pill border-0 shadow-sm ps-3" 
               placeholder="Escribe tu duda..." 
               [value]="mensajeUsuario()"
               (input)="mensajeUsuario.set($any($event.target).value)"
               (keyup.enter)="enviar()"
               [disabled]="cargando()">
        <button class="btn btn-danger rounded-circle ms-2 shadow-sm d-flex align-items-center justify-content-center" 
                style="width: 40px; height: 40px;"
                (click)="enviar()" 
                [disabled]="cargando() || !mensajeUsuario().trim()">
          <i class="bi bi-send-fill"></i>
        </button>
      </div>
    </div>
  </div>
}

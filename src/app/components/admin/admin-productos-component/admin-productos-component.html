<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-box-seam me-2"></i>Añadir Nuevo Producto</h4>
    
    @if (successMsg()) {
      <div class="alert alert-success fw-bold">
        <i class="bi bi-check-circle me-2"></i>¡Producto guardado en el catálogo correctamente!
      </div>
    }

    <form [formGroup]="productForm" (ngSubmit)="guardarProducto()">
      
      <div class="row g-3">
        <div class="col-md-12">
          <label class="form-label fw-bold">Nombre del Repuesto / Producto <span class="text-danger">*</span></label>
          <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Ballesta Trasera Reforzada">
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Categoría <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="categoria_id">
            <option [ngValue]="null" disabled>Selecciona una categoría...</option>
            @for (cat of categorias(); track cat.id) {
              <option [value]="cat.id">{{ cat.nombre }}</option>
            }
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label fw-bold">Marca Compatible <span class="text-danger">*</span></label>
          <select class="form-select" formControlName="marca_id">
            <option [ngValue]="null" disabled>Selecciona una marca...</option>
            @for (marca of marcas(); track marca.id) {
              <option [value]="marca.id">{{ marca.nombre }}</option>
            }
          </select>
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Precio (€) <span class="text-danger">*</span></label>
          <input type="number" step="0.01" class="form-control" formControlName="precio" placeholder="0.00">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">Unidades en Stock <span class="text-danger">*</span></label>
          <input type="number" class="form-control" formControlName="stock" placeholder="0">
        </div>

        <div class="col-md-4">
          <label class="form-label fw-bold">URL de la Imagen</label>
          <input type="text" class="form-control" formControlName="imagen_url" placeholder="https://ejemplo.com/foto.jpg">
        </div>

        <div class="col-md-12">
          <label class="form-label fw-bold">Descripción / Detalles Técnicos</label>
          <textarea class="form-control" formControlName="descripcion" rows="3" placeholder="Medidas, referencias originales, detalles..."></textarea>
        </div>

        <div class="col-md-12 mt-4">
          <div class="form-check form-switch fs-5">
            <input class="form-check-input" type="checkbox" id="destacadoSwitch" formControlName="destacado">
            <label class="form-check-label fw-bold ms-2" for="destacadoSwitch">
              Mostrar en la portada como "Producto Destacado"
            </label>
          </div>
        </div>
      </div>

      <hr class="my-4">

      <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-danger btn-lg px-5 fw-bold shadow-sm" [disabled]="productForm.invalid">
          <i class="bi bi-save me-2"></i>Guardar Producto
        </button>
      </div>

    </form>
  </div>
</div>

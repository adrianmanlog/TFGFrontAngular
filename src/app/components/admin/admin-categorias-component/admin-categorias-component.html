<div class="row g-4">
  <div class="col-xl-4">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-folder-plus me-2 text-danger"></i>Nueva Categoría</h4>
        
        @if (success()) {
          <div class="alert alert-success border-0 shadow-sm rounded-3">Categoría creada correctamente</div>
        }

        <form [formGroup]="catForm" (ngSubmit)="enviar()">
          <div class="mb-3">
            <label class="form-label fw-bold">Nombre de la Categoría</label>
            <input type="text" class="form-control" formControlName="nombre" placeholder="Ej: Amortiguadores">
          </div>
          <div class="mb-4">
            <label class="form-label fw-bold">Icono (Bootstrap Icon)</label>
            <input type="text" class="form-control" formControlName="icono" placeholder="Ej: bi-gear">
          </div>
          <button type="submit" class="btn btn-danger w-100 py-2 fw-bold rounded-3" [disabled]="catForm.invalid">Crear Categoría</button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-xl-8">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-tags me-2 text-dark"></i>Gestión de Categorías</h4>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Icono</th>
                <th>Nombre</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              @for (cat of categorias(); track cat.id) {
                <tr>
                  <td class="fw-bold text-muted">#{{ cat.id }}</td>
                  <td><i class="bi {{ cat.icono || 'bi-folder' }} fs-5 text-secondary"></i></td>
                  <td class="fw-bold">{{ cat.nombre }}</td>
                  <td class="text-end">
                    <button class="btn btn-warning btn-sm me-2 rounded-2" (click)="abrirEditar(cat)" title="Editar">
                      <i class="bi bi-pencil-fill"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm rounded-2" (click)="borrar(cat.id)" title="Borrar">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

@if (categoriaSeleccionada()) {
  <app-admin-edit-categoria 
    [categoria]="categoriaSeleccionada()" 
    (cerrar)="cerrarModal()" 
    (guardado)="cargarCategorias()">
  </app-admin-edit-categoria>
}

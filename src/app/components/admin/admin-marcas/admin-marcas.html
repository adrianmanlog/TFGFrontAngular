<div class="row g-4">
  <div class="col-xl-4">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-award-fill me-2 text-dark"></i>Nueva Marca Oficial</h4>
        
        @if (success()) {
          <div class="alert alert-success fw-bold border-0 shadow-sm rounded-3">
            <i class="bi bi-check-circle me-2"></i>¡Marca registrada!
          </div>
        }

        <form [formGroup]="marcaForm" (ngSubmit)="enviar()">
          <div class="mb-4">
            <label class="form-label fw-bold">Nombre del Fabricante (Ej: Volvo, Scania...)</label>
            <input type="text" class="form-control bg-light" formControlName="nombre" placeholder="Introduce el nombre">
          </div>
          <button type="submit" class="btn btn-dark w-100 py-2 fw-bold shadow-sm rounded-3" [disabled]="marcaForm.invalid">
            Guardar Marca
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="col-xl-8">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-4">
        <h4 class="fw-bold mb-4"><i class="bi bi-grid-3x3-gap me-2 text-secondary"></i>Marcas Indexadas</h4>
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
              <tr>
                <th>ID</th>
                <th>Nombre del Fabricante</th>
                <th class="text-end">Acciones</th>
              </tr>
            </thead>
            <tbody>
              @for (marca of marcas(); track marca.id) {
                <tr>
                  <td class="fw-bold text-muted">#{{ marca.id }}</td>
                  <td class="fw-bold text-uppercase">{{ marca.nombre }}</td>
                  <td class="text-end">
                    <button class="btn btn-warning btn-sm me-2 rounded-2" (click)="abrirEditar(marca)">
                      <i class="bi bi-pencil-fill"></i>
                    </button>
                    <button class="btn btn-outline-danger btn-sm rounded-2" (click)="borrar(marca.id)">
                      <i class="bi bi-trash3-fill"></i>
                    </button>
                  </td>
                </tr>
              }
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

@if (marcaSeleccionada()) {
  <app-admin-edit-marca 
    [marca]="marcaSeleccionada()" 
    (cerrar)="cerrarModal()" 
    (guardado)="cargarMarcas()">
  </app-admin-edit-marca>
}

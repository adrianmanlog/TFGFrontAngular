<div class="card shadow-sm border-0">
  <div class="card-body p-4">
    <h4 class="fw-bold mb-4"><i class="bi bi-award me-2"></i>Nueva Marca Oficial</h4>
    
    @if (success()) {
      <div class="alert alert-success fw-bold">
        <i class="bi bi-check-circle me-2"></i>¡Marca registrada correctamente!
      </div>
    }

    <form [formGroup]="marcaForm" (ngSubmit)="enviar()">
      <div class="mb-4">
        <label class="form-label fw-bold">Nombre de la Marca (Ej: Volvo, Scania...)</label>
        <input type="text" class="form-control form-control-lg bg-light" formControlName="nombre" placeholder="Introduce el nombre">
      </div>
      
      <button type="submit" class="btn btn-dark px-5 fw-bold shadow-sm" [disabled]="marcaForm.invalid">
        Guardar Marca
      </button>
    </form>
  </div>
</div>
